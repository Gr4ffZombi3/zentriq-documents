{% from "ui/icons.html" import icon %}
<div id="upload-widget"
     x-data="{ dragging: false }"
     x-on:dragover.prevent="dragging = true"
     x-on:dragleave.prevent="dragging = false"
     x-on:drop.prevent="dragging = false; $refs.fileInput.files = $event.dataTransfer.files; $refs.form.requestSubmit()">
  <form x-ref="form" hx-post="{{ url_for('upload.upload_document') }}" hx-encoding="multipart/form-data"
        hx-target="#upload-widget" hx-swap="outerHTML" hx-indicator="#upload-progress"
        class="rounded-2xl border-2 border-dashed p-12 text-center shadow-soft transition duration-200"
        :class="dragging ? 'border-primary bg-primary/5' : 'border-border bg-surface'">
    <div class="mb-5 flex flex-wrap items-center justify-center gap-2">
      <label class="inline-flex cursor-pointer items-center rounded-full border border-border bg-surface px-3.5 py-1.5 text-xs font-medium text-text-muted transition duration-200 hover:border-primary/40 hover:text-text has-[:checked]:border-primary has-[:checked]:bg-primary/10 has-[:checked]:text-primary">
        <input type="radio" name="list_scope" value="" checked class="sr-only">
        Automatisch erkennen
      </label>
      <label class="inline-flex cursor-pointer items-center rounded-full border border-border bg-surface px-3.5 py-1.5 text-xs font-medium text-text-muted transition duration-200 hover:border-primary/40 hover:text-text has-[:checked]:border-primary has-[:checked]:bg-primary/10 has-[:checked]:text-primary">
        <input type="radio" name="list_scope" value="own" class="sr-only">
        Eigene Liste
      </label>
      <label class="inline-flex cursor-pointer items-center rounded-full border border-border bg-surface px-3.5 py-1.5 text-xs font-medium text-text-muted transition duration-200 hover:border-primary/40 hover:text-text has-[:checked]:border-primary has-[:checked]:bg-primary/10 has-[:checked]:text-primary">
        <input type="radio" name="list_scope" value="geschaeftsstelle" class="sr-only">
        GS-Liste
      </label>
    </div>
    <label for="file-input" class="flex cursor-pointer flex-col items-center gap-3">
      <span class="flex h-16 w-16 items-center justify-center rounded-2xl bg-primary/10 text-primary transition duration-200" :class="dragging ? 'scale-110' : ''">
        {{ icon('upload', class='w-7 h-7') }}
      </span>
      <span class="text-sm font-medium text-text">PDF hierher ziehen oder klicken zum Auswählen</span>
      <span class="text-xs text-text-muted">Nur PDF-Dateien</span>
    </label>
    <input x-ref="fileInput" id="file-input" type="file" name="file" accept="application/pdf"
           class="sr-only" x-on:change="$refs.form.requestSubmit()">
    <div id="upload-progress" class="htmx-indicator mt-5">
      {% from "ui/display.html" import progressbar %}
      {{ progressbar() }}
      <p class="mt-2 text-xs text-text-muted">Wird hochgeladen…</p>
    </div>
  </form>
  {% if error %}
    <p class="mt-3 flex items-center gap-1.5 text-sm text-error">
      {{ icon('alert-circle', class='w-4 h-4') }}
      {{ error }}
    </p>
  {% endif %}
</div>
