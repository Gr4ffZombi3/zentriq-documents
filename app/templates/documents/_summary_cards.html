<section class="summary-strip summary-strip-4" aria-label="Dokumentenstatus">
  <article class="summary-metric summary-metric-info">
    <span class="summary-metric-label">Gesamt</span>
    <strong class="summary-metric-value">{{ summary.total }}</strong>
    <p class="summary-metric-copy">Dokumente in dieser Ansicht</p>
  </article>
  <article class="summary-metric summary-metric-info">
    <span class="summary-metric-label">In Arbeit</span>
    <strong class="summary-metric-value">{{ summary.active }}</strong>
    <p class="summary-metric-copy">OCR oder KI laufen noch</p>
  </article>
  <article class="summary-metric summary-metric-success">
    <span class="summary-metric-label">Bereit</span>
    <strong class="summary-metric-value">{{ summary.done }}</strong>
    <p class="summary-metric-copy">Zur Prüfung und Folgearbeit</p>
  </article>
  <article class="summary-metric summary-metric-danger">
    <span class="summary-metric-label">Fehler</span>
    <strong class="summary-metric-value">{{ summary.failed }}</strong>
    <p class="summary-metric-copy">Benötigen Nacharbeit</p>
  </article>
</section>
