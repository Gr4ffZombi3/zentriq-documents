{% from "ui/icons.html" import icon %}

<header class="topbar-panel">
  <button
    type="button"
    x-on:click="sidebarOpen = true"
    class="topbar-icon-button lg:hidden"
    aria-label="Menü öffnen"
  >
    {{ icon('menu', class='w-5 h-5') }}
  </button>

  <div class="topbar-copy min-w-0">
    <p class="topbar-kicker">Zentriq</p>
    <div class="mt-1 flex items-center gap-2">
      <p class="topbar-title">Dokumenten-Workspace</p>
      {% if current_user.is_authenticated and current_user.vermittlernummer %}
        <span class="topbar-status-pill">{{ current_user.vermittlernummer }}</span>
      {% endif %}
    </div>
  </div>

  <form action="{{ url_for('search.search') }}" method="get" class="topbar-search-wrap ml-auto min-w-0 flex-1">
    <label class="topbar-search">
      <span class="text-text-soft">
        {{ icon('search', class='w-4 h-4') }}
      </span>
      <input
        type="text"
        name="q"
        aria-label="Suche"
        placeholder="Dokumente, Kunden oder Vorgänge durchsuchen"
        class="topbar-search-input"
      >
    </label>
  </form>

  <div class="topbar-actions flex items-center gap-2">
    <button
      type="button"
      x-data="{ dark: document.documentElement.classList.contains('dark') }"
      x-on:click="dark = !dark; document.documentElement.classList.toggle('dark', dark); localStorage.setItem('zentriq-theme', dark ? 'dark' : 'light')"
      class="topbar-icon-button"
      aria-label="Farbschema wechseln"
    >
      <template x-if="!dark">{{ icon('moon', class='w-[1.05rem] h-[1.05rem]') }}</template>
      <template x-if="dark">{{ icon('sun', class='w-[1.05rem] h-[1.05rem]') }}</template>
    </button>
  </div>
</header>
