<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
  // Dark Mode so früh wie möglich setzen (vor dem CSS-Load), um ein Aufblitzen des
  // falschen Themes zu vermeiden. localStorage hat Vorrang vor prefers-color-scheme,
  // damit ein manueller Toggle über Reloads hinweg bestehen bleibt.
  (function () {
    var stored = localStorage.getItem("zentriq-theme");
    var dark = stored ? stored === "dark" : false;
    document.documentElement.classList.toggle("dark", dark);
  })();
</script>
<meta name="csrf-token" content="{{ csrf_token() }}">
