{% from "ui/icons.html" import icon %}

<header class="glass-surface sticky top-0 z-20 flex h-16 items-center gap-4 border-b border-border px-4 lg:px-8">
  <button
    type="button"
    x-on:click="sidebarOpen = true"
    class="text-text-muted hover:text-text lg:hidden"
    aria-label="Menü öffnen"
  >
    {{ icon('menu', class='w-6 h-6') }}
  </button>

  <form action="{{ url_for('search.search') }}" method="get" class="max-w-xl flex-1">
    <div class="relative">
      <span class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-text-muted">
        {{ icon('search', class='w-4 h-4') }}
      </span>
      <input
        type="text"
        name="q"
        aria-label="KI-Suche"
        placeholder="Suchen…"
        class="w-full rounded-xl border border-transparent bg-bg py-2.5 pl-11 pr-3 text-sm text-text placeholder:text-text-muted transition duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary focus:bg-surface"
      >
    </div>
  </form>

  <div class="ml-auto flex items-center gap-3">
    <button type="button" class="text-text-muted hover:text-text" aria-label="Benachrichtigungen">
      {{ icon('bell', class='w-5 h-5') }}
    </button>

    <div x-data="{ open: false }" x-on:click.outside="open = false" class="relative">
      <button
        type="button"
        x-on:click="open = !open"
        class="flex items-center gap-2 rounded-lg px-2 py-1.5 transition duration-200 hover:bg-bg"
      >
        <span class="flex h-8 w-8 items-center justify-center rounded-full bg-primary/10 text-sm font-semibold text-primary">
          {{ current_user.email[0] | upper }}
        </span>
        <span class="hidden text-sm font-medium text-text sm:inline">{{ current_user.email }}</span>
        {{ icon('chevron-down', class='w-4 h-4 text-text-muted') }}
      </button>
      <div
        x-show="open"
        x-cloak
        x-transition
        class="glass-surface absolute right-0 mt-2 w-56 rounded-2xl border border-border p-1.5 shadow-soft-lg"
      >
        <a href="{{ url_for('settings.profile') }}" class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-text transition duration-200 hover:bg-bg">
          {{ icon('user-cog', class='w-4 h-4') }}
          Profil
        </a>
        <form method="post" action="{{ url_for('auth.logout') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-left text-sm text-text transition duration-200 hover:bg-bg">
            {{ icon('log-out', class='w-4 h-4') }}
            Abmelden
          </button>
        </form>
      </div>
    </div>
  </div>
</header>
