<!doctype html>
<html lang="de">
<head>
  <title>{% block title %}Zentriq Documents{% endblock %}</title>
  {% include "components/_head_common.html" %}
  {% block head %}{% endblock %}
</head>
<body
  x-data="{ sidebarOpen: false, railCollapsed: localStorage.getItem('zentriq-sidebar-collapsed') === '1' }"
  x-init="$watch('railCollapsed', (value) => localStorage.setItem('zentriq-sidebar-collapsed', value ? '1' : '0'))"
  class="bg-bg text-text antialiased overflow-hidden"
>
  <div class="app-frame">
    {% include "components/sidebar.html" %}
    <div class="app-main" :class="{ 'app-main-collapsed': railCollapsed }">
      <div class="app-main-inner">
        {% include "components/topbar.html" %}
        <main class="app-content-area">
          {% from "ui/overlays.html" import toast_container %}
          {{ toast_container() }}
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
  </div>
</body>
</html>
