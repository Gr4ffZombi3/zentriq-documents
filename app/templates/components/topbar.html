{% from "ui/icons.html" import icon %}

<header class="topbar-panel sticky top-0 z-20">
  <button
    type="button"
    x-on:click="sidebarOpen = true"
    class="topbar-icon-button lg:hidden"
    aria-label="Menue oeffnen"
  >
    {{ icon('menu', class='w-5 h-5') }}
  </button>

  <div class="topbar-copy hidden min-w-0 xl:block">
    <p class="topbar-kicker">Operations Workspace</p>
    <div class="mt-1 flex items-center gap-2">
      <p class="topbar-title">Zentriq Command</p>
      <span class="topbar-status-pill">Live</span>
    </div>
  </div>

  <form action="{{ url_for('search.search') }}" method="get" class="topbar-search-wrap ml-auto min-w-0 flex-1">
    <label class="topbar-search">
      <span class="text-text-soft">
        {{ icon('search', class='w-4 h-4') }}
      </span>
      <input
        type="text"
        name="q"
        aria-label="KI-Suche"
        placeholder="Dokumente, Kunden, Aufgaben oder Fragen durchsuchen"
        class="topbar-search-input"
      >
      <span class="meta-chip hidden lg:inline-flex">/</span>
    </label>
  </form>

  <div class="topbar-actions flex items-center gap-2">
    <button
      type="button"
      x-data="{ dark: document.documentElement.classList.contains('dark') }"
      x-on:click="dark = !dark; document.documentElement.classList.toggle('dark', dark); localStorage.setItem('zentriq-theme', dark ? 'dark' : 'light')"
      class="topbar-icon-button"
      aria-label="Farbschema wechseln"
    >
      <template x-if="!dark">{{ icon('moon', class='w-[1.05rem] h-[1.05rem]') }}</template>
      <template x-if="dark">{{ icon('sun', class='w-[1.05rem] h-[1.05rem]') }}</template>
    </button>

    <button type="button" class="topbar-icon-button" aria-label="Benachrichtigungen">
      {{ icon('bell', class='w-[1.05rem] h-[1.05rem]') }}
    </button>

    <div x-data="{ open: false }" x-on:click.outside="open = false" class="relative">
      <button
        type="button"
        x-on:click="open = !open"
        class="topbar-profile"
      >
        <span class="avatar-chip">{{ current_user.email[0] | upper }}</span>
        <span class="hidden min-w-0 text-left xl:block">
          <span class="block max-w-[190px] truncate text-sm font-semibold text-text">{{ current_user.email }}</span>
          <span class="block text-xs text-text-muted">Profil &amp; Einstellungen</span>
        </span>
        {{ icon('chevron-down', class='w-4 h-4 text-text-soft') }}
      </button>
      <div
        x-show="open"
        x-cloak
        x-transition
        class="dropdown-panel absolute right-0 mt-3 w-64"
      >
        <a href="{{ url_for('settings.profile') }}" class="dropdown-link">
          {{ icon('user-cog', class='w-4 h-4') }}
          Profil
        </a>
        <a href="{{ url_for('settings.index') }}" class="dropdown-link">
          {{ icon('settings', class='w-4 h-4') }}
          Einstellungen
        </a>
        <form method="post" action="{{ url_for('auth.logout') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="dropdown-link w-full text-left">
            {{ icon('log-out', class='w-4 h-4') }}
            Abmelden
          </button>
        </form>
      </div>
    </div>
  </div>
</header>
